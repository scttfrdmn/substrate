version: "2"

linters:
  default: none
  enable:
    - errcheck        # check for unchecked errors
    - govet           # go vet checks
    - ineffassign     # detect ineffectual assignments
    - misspell        # spell-check comments and strings
    - revive          # fast, configurable linter (replaces golint)
    - staticcheck     # comprehensive static analysis
    - unused          # detect unused code
    - godot           # doc comments must end with a period
    - gofmt           # enforce gofmt formatting
    - goimports       # enforce goimports import grouping
    - gosimple        # simplification suggestions
    - nilerr          # return nil instead of errors.New("")
    - unconvert       # remove unnecessary type conversions

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: var-naming
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  godot:
    scope: declarations
    period: true
  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Allow TODO comments that reference issue numbers.
    - text: "TODO\\(#\\d+\\)"
      linters: [godot]
    # Test files may use unexported helpers freely.
    - path: "_test\\.go"
      linters: [revive]
