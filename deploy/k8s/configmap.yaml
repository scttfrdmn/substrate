apiVersion: v1
kind: ConfigMap
metadata:
  name: substrate-config
  labels:
    app: substrate
data:
  config.yaml: |
    server:
      address: ":4566"
      read_timeout: "30s"
      write_timeout: "30s"
      shutdown_timeout: "10s"

    event_store:
      enabled: true
      backend: "sqlite"
      persist_path: "/var/lib/substrate"
      dsn: "substrate.db"

    log:
      format: "json"
      level: "info"

    costs:
      enabled: true

    metrics:
      enabled: true

    quotas:
      enabled: true

    consistency:
      enabled: false
      propagation_delay: "2s"
      affected_services:
        - "iam"

    tracing:
      enabled: false

    fault:
      enabled: false

    region:
      default: "us-east-1"
