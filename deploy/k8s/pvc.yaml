apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: substrate-data
  labels:
    app: substrate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Uncomment storageClassName for your cloud provider:
  #
  # AWS EKS (gp3):
  #   storageClassName: gp3
  #
  # GKE:
  #   storageClassName: premium-rwo
  #
  # AKS:
  #   storageClassName: managed-premium
  #
  # Leave unset to use the cluster's default StorageClass.
