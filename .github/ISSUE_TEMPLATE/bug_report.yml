name: Bug report
description: Something is not working correctly.
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or command sequence that triggers the bug.
      placeholder: |
        store := substrate.NewEventStore(...)
        // ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Substrate version
      placeholder: "v0.1.0 or git SHA"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: "go1.26.1"
    validations:
      required: true
