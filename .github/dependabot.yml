version: 2
updates:
  # Root Go module.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  # End-to-end test Go module.
  - package-ecosystem: gomod
    directory: /test/e2e
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  # VitePress docs site (npm).
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  # pytest-substrate Python package.
  - package-ecosystem: pip
    directory: /python
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
